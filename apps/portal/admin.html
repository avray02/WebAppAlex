<!doctype html>
<html lang="fr" class="auth-pending" data-require-admin="true">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestion des acces - WebAppAlex</title>
    <meta
      name="description"
      content="Gestion des acces aux applications WebAppAlex."
    />
    <link rel="stylesheet" href="../../packages/ui/theme.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="firebase-config.js"></script>
    <script type="module" src="auth-guard.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="topbar" aria-label="Navigation principale">
        <a class="brand" href="index.html" aria-label="Retour au portail">
          <span class="brand-mark">WA</span>
          <span class="brand-text">
            <span class="brand-name">WebAppAlex</span>
            <span class="brand-caption">Administration</span>
          </span>
        </a>
        <nav class="nav-actions" aria-label="Actions">
          <span class="pill"><span class="status-dot blue"></span><span data-auth-user>Compte</span></span>
          <a class="text-button" href="index.html">Portail</a>
          <button class="icon-button" type="button" title="Se deconnecter" data-auth-signout>
            <span aria-hidden="true">x</span>
            <span class="sr-only">Se deconnecter</span>
          </button>
        </nav>
      </header>

      <main class="admin-page">
        <section class="admin-heading" aria-labelledby="admin-title">
          <div>
            <p class="eyebrow">Administration</p>
            <h1 id="admin-title">Acces aux applications</h1>
            <p>
              Les comptes apparaissent ici apres leur premiere connexion a
              WebAppAlex.
            </p>
          </div>
          <button class="text-button" type="button" data-users-refresh>
            Actualiser
          </button>
        </section>

        <p class="access-notice" data-admin-status hidden></p>

        <section class="users-section" aria-labelledby="users-title">
          <div class="section-heading">
            <div>
              <h2 id="users-title">Utilisateurs</h2>
              <p data-user-count>Chargement des comptes...</p>
            </div>
          </div>
          <div class="user-access-list" data-user-list></div>
        </section>
      </main>

      <footer class="site-footer">
        <span>WebAppAlex</span>
        <span>Autorisations Firebase</span>
      </footer>
    </div>

    <script type="module" src="admin.js"></script>
  </body>
</html>
