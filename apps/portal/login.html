<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion - WebAppAlex</title>
    <meta name="description" content="Connexion au compte WebAppAlex." />
    <link rel="stylesheet" href="../../packages/ui/theme.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="firebase-config.js"></script>
    <script type="module" src="login.js"></script>
  </head>
  <body>
    <main class="login-page">
      <section class="login-panel" aria-labelledby="login-title">
        <div class="login-brand">
          <span class="brand-mark">WA</span>
          <div>
            <p class="eyebrow">Compte WebAppAlex</p>
            <h1 id="login-title">Connexion</h1>
          </div>
        </div>

        <form class="login-form" data-login-form>
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>

          <label>
            <span>Mot de passe</span>
            <input
              name="password"
              type="password"
              autocomplete="current-password"
              required
              minlength="6"
            />
          </label>

          <p class="form-error" data-login-error hidden></p>

          <button class="card-link login-submit" type="submit" data-login-submit>
            Se connecter
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
