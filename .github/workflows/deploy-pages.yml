name: Deploy WebAppAlex to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/athletic-performance/package-lock.json

      - name: Install Athletic Performance dependencies
        working-directory: apps/athletic-performance
        run: npm ci

      - name: Build Athletic Performance
        working-directory: apps/athletic-performance
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/apps/athletic-performance/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Validate Firebase deployment config
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          test -n "$VITE_FIREBASE_API_KEY"
          test -n "$VITE_FIREBASE_AUTH_DOMAIN"
          test -n "$VITE_FIREBASE_PROJECT_ID"
          test -n "$VITE_FIREBASE_STORAGE_BUCKET"
          test -n "$VITE_FIREBASE_MESSAGING_SENDER_ID"
          test -n "$VITE_FIREBASE_APP_ID"

      - name: Compose Pages artifact
        shell: bash
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          rm -rf pages-dist
          mkdir -p pages-dist/apps pages-dist/packages
          cp index.html pages-dist/index.html
          cp -R packages/ui pages-dist/packages/ui
          cp -R apps/portal pages-dist/apps/portal
          cp -R apps/focus-board pages-dist/apps/focus-board
          cp -R apps/budget-pulse pages-dist/apps/budget-pulse
          mkdir -p pages-dist/apps/athletic-performance
          cp -R apps/athletic-performance/dist/. pages-dist/apps/athletic-performance/
          cat > pages-dist/apps/portal/firebase-config.js <<EOF
          window.WEBAPPALEX_FIREBASE_CONFIG = {
            apiKey: "$VITE_FIREBASE_API_KEY",
            authDomain: "$VITE_FIREBASE_AUTH_DOMAIN",
            projectId: "$VITE_FIREBASE_PROJECT_ID",
            storageBucket: "$VITE_FIREBASE_STORAGE_BUCKET",
            messagingSenderId: "$VITE_FIREBASE_MESSAGING_SENDER_ID",
            appId: "$VITE_FIREBASE_APP_ID",
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
